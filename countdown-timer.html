<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒数计时器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:       #c9a84c;
      --gold-dim:   #7a5e28;
      --gold-glow:  rgba(201,168,76,0.25);
      --cream:      #f0e6ce;
      --ink:        #0a0804;
      --surface:    #111009;
      --surface2:   #1a1710;
      --warn:       #c0392b;
      --warn-glow:  rgba(192,57,43,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, #1e1a0e 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,168,76,0.03) 39px, rgba(201,168,76,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,0.03) 39px, rgba(201,168,76,0.03) 40px);
      font-family: 'Josefin Sans', sans-serif;
      color: var(--cream);
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 52px 40px;
      background: var(--surface);
      border: 1px solid var(--gold-dim);
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.08),
        0 0 60px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(201,168,76,0.15);
      position: relative;
    }

    /* Corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold-dim);
      border-style: solid;
    }
    .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

    /* extra corners via pseudo on inner wrapper */
    .inner::before, .inner::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold-dim);
      border-style: solid;
    }
    .inner::before { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
    .inner::after  { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
    .inner { position: absolute; inset: 0; pointer-events: none; }

    h1 {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.8;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0.6;
    }

    /* --- Inputs --- */
    .inputs {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .input-group label {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.6;
    }

    .input-group input {
      width: 62px;
      padding: 6px 4px;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      background: var(--surface2);
      border: 1px solid var(--gold-dim);
      color: var(--cream);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      -moz-appearance: textfield;
    }
    .input-group input::-webkit-inner-spin-button,
    .input-group input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .input-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow);
    }

    .sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--gold-dim);
      margin-bottom: 6px;
      opacity: 0.7;
    }

    /* --- Ring --- */
    .ring-wrap {
      position: relative;
      width: 240px;
      height: 240px;
    }

    svg.ring {
      transform: rotate(-90deg);
      filter: drop-shadow(0 0 8px var(--gold-glow));
    }

    .ring-bg {
      fill: none;
      stroke: #1e1c14;
      stroke-width: 2;
    }

    /* Tick marks */
    .ring-ticks {
      fill: none;
      stroke: var(--gold-dim);
      stroke-width: 1;
      opacity: 0.4;
    }

    .ring-progress {
      fill: none;
      stroke: url(#goldGrad);
      stroke-width: 3;
      stroke-linecap: butt;
      transition: stroke-dashoffset 0.85s cubic-bezier(0.4,0,0.2,1), stroke 0.4s;
    }

    .ring-progress.warning {
      stroke: var(--warn);
      filter: drop-shadow(0 0 6px var(--warn-glow));
    }

    .ring-inner {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #1e1c14, var(--surface));
      border: 1px solid rgba(201,168,76,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time-display {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--cream);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color 0.3s;
    }

    .time-display.warning {
      color: #e74c3c;
      text-shadow: 0 0 20px var(--warn-glow);
    }

    .ring-label {
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      color: var(--gold);
      opacity: 0.5;
      text-transform: uppercase;
    }

    /* --- Presets --- */
    .presets {
      display: flex;
      gap: 8px;
    }

    .preset {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.1s;
    }

    .preset:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow);
    }
    .preset:active { transform: scale(0.97); }

    /* --- Controls --- */
    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
    }
    button:active { transform: scale(0.97); }

    #btnStart {
      padding: 10px 36px;
      font-size: 0.65rem;
      background: var(--gold);
      color: var(--ink);
      box-shadow: 0 0 20px var(--gold-glow);
      min-width: 110px;
    }
    #btnStart:hover {
      background: #dbb95a;
      box-shadow: 0 0 32px rgba(201,168,76,0.5);
    }

    #btnReset {
      padding: 10px 28px;
      font-size: 0.65rem;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold-dim);
    }
    #btnReset:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* --- Status --- */
    .status {
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      color: var(--gold);
      min-height: 1em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* Fade-in on load */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.7s ease both; }
  </style>
</head>
<body>
<div class="card">
  <div class="inner"></div>

  <h1>Countdown</h1>
  <div class="divider"></div>

  <div class="inputs">
    <div class="input-group">
      <input type="number" id="inputH" min="0" max="99" value="0">
      <label>HR</label>
    </div>
    <span class="sep">·</span>
    <div class="input-group">
      <input type="number" id="inputM" min="0" max="59" value="5">
      <label>MIN</label>
    </div>
    <span class="sep">·</span>
    <div class="input-group">
      <input type="number" id="inputS" min="0" max="59" value="0">
      <label>SEC</label>
    </div>
  </div>

  <div class="ring-wrap">
    <svg class="ring" width="240" height="240" viewBox="0 0 240 240">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#c9a84c"/>
          <stop offset="50%"  stop-color="#f0d080"/>
          <stop offset="100%" stop-color="#c9a84c"/>
        </linearGradient>
      </defs>
      <!-- tick marks at every 6° (60 ticks) -->
      <g class="ring-ticks" transform="translate(120,120)">
        <!-- generated via JS below -->
      </g>
      <circle class="ring-bg" cx="120" cy="120" r="108"/>
      <circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="108"/>
    </svg>
    <div class="ring-inner">
      <div class="time-display" id="timeDisplay">05:00</div>
      <div class="ring-label">remaining</div>
    </div>
  </div>

  <div class="presets">
    <button class="preset" data-sec="20">20s</button>
    <button class="preset" data-sec="30">30s</button>
    <button class="preset" data-sec="60">1 min</button>
  </div>

  <div class="controls">
    <button id="btnStart">Start</button>
    <button id="btnReset">Reset</button>
  </div>

  <div class="divider"></div>
  <div class="status" id="status"></div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 108;

  // Draw 60 tick marks on the ring
  (function drawTicks() {
    const g = document.querySelector('.ring-ticks');
    for (let i = 0; i < 60; i++) {
      const angle = (i / 60) * 2 * Math.PI;
      const isMajor = i % 5 === 0;
      const r1 = isMajor ? 100 : 103;
      const r2 = 108;
      const x1 = Math.cos(angle) * r1, y1 = Math.sin(angle) * r1;
      const x2 = Math.cos(angle) * r2, y2 = Math.sin(angle) * r2;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke-width', isMajor ? '1.5' : '0.8');
      if (isMajor) line.setAttribute('opacity', '0.7');
      g.appendChild(line);
    }
  })();

  const ringProgress = document.getElementById('ringProgress');
  const timeDisplay  = document.getElementById('timeDisplay');
  const btnStart     = document.getElementById('btnStart');
  const btnReset     = document.getElementById('btnReset');
  const statusEl     = document.getElementById('status');
  const inputH       = document.getElementById('inputH');
  const inputM       = document.getElementById('inputM');
  const inputS       = document.getElementById('inputS');

  ringProgress.style.strokeDasharray  = CIRCUMFERENCE;
  ringProgress.style.strokeDashoffset = 0;

  let totalSeconds  = 0;
  let remaining     = 0;
  let intervalId    = null;
  let running       = false;
  let audioCtx      = null;
  let audioUnlocked = false;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  // iOS requires AudioContext to be resumed inside a user gesture
  function unlockAudio() {
    if (audioUnlocked) return;
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    // Play a silent buffer to fully unlock on iOS
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    audioUnlocked = true;
  }

  function playTick() {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.08);
  }

  function playEnd() {
    const ctx = getAudioCtx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t);
      osc.stop(t + 0.4);
    });
  }

  function formatTime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) {
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function updateRing(rem, total) {
    const fraction = total > 0 ? rem / total : 0;
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
    const warn = rem <= 10 && rem > 0;
    ringProgress.classList.toggle('warning', warn);
    timeDisplay.classList.toggle('warning', warn);
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);
    updateRing(remaining, totalSeconds);
  }

  const countWords = ['','one','two','three','four','five','six','seven','eight','nine','ten'];

  let femaleVoice = null;
  let speechChainActive = false;

  function loadFemaleVoice() {
    const voices = speechSynthesis.getVoices();
    femaleVoice =
      voices.find(v => v.name === 'Samantha') ||
      voices.find(v => v.name.includes('Zira')) ||
      voices.find(v => v.lang === 'en-US' && v.name.toLowerCase().includes('female')) ||
      voices.find(v => v.lang === 'en-US') ||
      null;
  }

  speechSynthesis.onvoiceschanged = loadFemaleVoice;
  loadFemaleVoice();

  function makeUtt(text) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = 0.95;
    utt.pitch = 1.1;
    if (femaleVoice) utt.voice = femaleVoice;
    return utt;
  }

  // iOS blocks speechSynthesis inside setInterval. Instead, we chain utterances
  // via onend, each one scheduled 1 second apart using the speech duration itself.
  // This runs entirely outside setInterval and works reliably on iOS Safari.
  function startSpeechChain(fromCount) {
    speechSynthesis.cancel();
    speechChainActive = true;

    function speakNext(count) {
      if (!speechChainActive || count < 0) return;

      const text = count === 0 ? 'Time is up!' : countWords[count];
      const utt = makeUtt(text);

      utt.onend = () => {
        if (!speechChainActive) return;
        if (count === 0) return;
        // Wait out the remainder of this second before speaking next number
        const elapsed = performance.now() - startTime;
        const delay = Math.max(0, 1000 - elapsed);
        setTimeout(() => {
          startTime = performance.now();
          speakNext(count - 1);
        }, delay);
      };

      var startTime = performance.now();
      speechSynthesis.speak(utt);
    }

    speakNext(fromCount);
  }

  function stopSpeechChain() {
    speechChainActive = false;
    speechSynthesis.cancel();
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(intervalId);
      running = false;
      btnStart.textContent = 'Start';
      setInputsDisabled(false);
      statusEl.textContent = 'Time\'s up';
      playEnd();
      updateDisplay();
      return;
    }
    if (remaining === 10) {
      // Hand off to speech chain; stop tick sound for last 10s
      startSpeechChain(10);
    } else if (remaining > 10) {
      playTick();
    }
    remaining--;
    updateDisplay();
  }

  function setInputsDisabled(disabled) {
    inputH.disabled = disabled;
    inputM.disabled = disabled;
    inputS.disabled = disabled;
  }

  function getInputSeconds() {
    const h = Math.max(0, parseInt(inputH.value) || 0);
    const m = Math.max(0, Math.min(59, parseInt(inputM.value) || 0));
    const s = Math.max(0, Math.min(59, parseInt(inputS.value) || 0));
    return h * 3600 + m * 60 + s;
  }

  btnStart.addEventListener('click', () => {
    unlockAudio();
    if (running) {
      // Pause
      clearInterval(intervalId);
      stopSpeechChain();
      running = false;
      btnStart.textContent = 'Resume';
      statusEl.textContent = 'Paused';
      setInputsDisabled(false);
    } else {
      if (!running && remaining === 0) {
        // Fresh start
        totalSeconds = getInputSeconds();
        if (totalSeconds <= 0) {
          statusEl.textContent = 'Set a time first';
          return;
        }
        remaining = totalSeconds;
        updateDisplay();
      }
      // Start / Resume
      running = true;
      btnStart.textContent = 'Pause';
      statusEl.textContent = 'Running';
      setInputsDisabled(true);
      intervalId = setInterval(tick, 1000);
    }
  });

  btnReset.addEventListener('click', () => {
    unlockAudio();
    stopSpeechChain();
    clearInterval(intervalId);
    running = false;
    remaining = 0;
    totalSeconds = 0;
    btnStart.textContent = 'Start';
    statusEl.textContent = '';
    setInputsDisabled(false);
    timeDisplay.textContent = formatTime(getInputSeconds());
    ringProgress.classList.remove('warning');
    timeDisplay.classList.remove('warning');
    ringProgress.style.strokeDashoffset = 0;
  });

  // Live preview while editing inputs
  [inputH, inputM, inputS].forEach(el => {
    el.addEventListener('input', () => {
      if (!running && remaining === 0) {
        timeDisplay.textContent = formatTime(getInputSeconds());
        ringProgress.style.strokeDashoffset = 0;
      }
    });
  });

  function startImmediately(seconds) {
    stopSpeechChain();
    clearInterval(intervalId);
    running = false;
    remaining = 0;
    totalSeconds = seconds;
    remaining = seconds;
    // Update inputs to reflect preset
    inputH.value = Math.floor(seconds / 3600);
    inputM.value = Math.floor((seconds % 3600) / 60);
    inputS.value = seconds % 60;
    updateDisplay();
    // Start right away
    running = true;
    btnStart.textContent = 'Pause';
    statusEl.textContent = 'Running';
    setInputsDisabled(true);
    intervalId = setInterval(tick, 1000);
  }

  document.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
      unlockAudio();
      startImmediately(parseInt(btn.dataset.sec));
    });
  });

  // Init display
  timeDisplay.textContent = formatTime(getInputSeconds());
</script>
</body>
</html>
